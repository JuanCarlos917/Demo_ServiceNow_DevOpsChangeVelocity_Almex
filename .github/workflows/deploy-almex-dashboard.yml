name: deploy-almex-dashboard

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: "Build and Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "✅ Validating index.html structure..."
          if grep -q "<html" index.html; then
            echo "HTML structure valid"
          else
            echo "Invalid HTML" && exit 1
          fi

      - name: Run unit tests
        run: |
          echo "✅ Running unit tests..."
          echo "  → Dashboard render: PASS"
          echo "  → Metrics display: PASS"
          echo "  → Activity feed: PASS"
          echo "  → Approval simulation: PASS"
          echo ""
          echo "4/4 tests passed"

      - name: Code quality check
        run: |
          echo "✅ Code quality analysis..."
          echo "  → Code coverage: 94.2%"
          echo "  → Critical vulnerabilities: 0"
          echo "  → Code smells: 2 (minor)"
          echo "  → Duplications: 0.8%"
          echo ""
          echo "Quality gate: PASSED"

  register-artifact:
    name: "Register Artifact"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ServiceNow DevOps Register Artifact
        uses: servicenow/servicenow-devops-register-artifact@v3.1.0
        with:
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: "Register Artifact"
          artifacts: |
            [
              {
                "name": "almex-dashboard",
                "version": "1.${{ github.run_number }}.0",
                "semanticVersion": "1.${{ github.run_number }}.0",
                "repositoryName": "${{ github.repository }}"
              }
            ]

  deploy-staging:
    name: "Deploy to Staging"
    needs: register-artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying almex-dashboard to STAGING..."
          echo "  → Uploading assets..."
          echo "  → Updating staging environment..."
          echo "  → Running smoke tests..."
          echo ""
          echo "✅ Staging deployment successful"
          echo "   URL: https://staging.almex.example.com"

  change-request:
    name: "ServiceNow Change Approval"
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ServiceNow DevOps Change
        uses: servicenow/servicenow-devops-change@v4.0.0
        with:
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          instance-url: ${{ secrets.SN_INSTANCE_URL }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID }}
          context-github: ${{ toJSON(github) }}
          job-name: "ServiceNow Change Approval"

  deploy-production:
    name: "Deploy to Production"
    needs: change-request
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "═══════════════════════════════════════"
          echo "  🚀 DEPLOYING TO PRODUCTION"
          echo "═══════════════════════════════════════"
          echo ""
          echo "  → Artifact: almex-dashboard v1.${{ github.run_number }}.0"
          echo "  → Target: production cluster"
          echo "  → Strategy: rolling update"
          echo ""
          echo "  [1/4] Pulling artifact.............. ✅"
          echo "  [2/4] Updating load balancer........ ✅"
          echo "  [3/4] Deploying to nodes............ ✅"
          echo "  [4/4] Health checks passing......... ✅"
          echo ""
          echo "═══════════════════════════════════════"
          echo "  ✅ PRODUCTION DEPLOYMENT COMPLETE"
          echo "  URL: https://dashboard.almex.example.com"
          echo "═══════════════════════════════════════"

      - name: Post-deploy verification
        run: |
          echo "Running post-deployment verification..."
          echo "  → HTTP 200 OK"
          echo "  → Response time: 142ms"
          echo "  → All metrics loading correctly"
          echo ""
          echo "✅ Verification passed. Deployment stable."
